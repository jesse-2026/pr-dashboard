<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Board - Jesse Fowler</title>
<style>
:root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --accent: #58a6ff; --green: #3fb950; --yellow: #d29922; --dim: #8b949e; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 900px; margin: 0 auto; }
h1 { font-size: 24px; margin-bottom: 4px; }
.subtitle { color: var(--dim); font-size: 14px; margin-bottom: 24px; }
h2 { font-size: 16px; color: var(--accent); margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
th { text-align: left; padding: 8px 12px; font-size: 12px; color: var(--dim); text-transform: uppercase; border-bottom: 1px solid var(--border); }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
tr:hover { background: var(--card); }
.pr { color: var(--green); font-weight: 600; }
.date { color: var(--dim); font-size: 13px; }
.load { font-weight: 600; font-size: 15px; }
.note { color: var(--dim); font-size: 12px; font-style: italic; }
.updated { text-align: center; color: var(--dim); font-size: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); }
@media (max-width: 600px) { body { padding: 12px; } td, th { padding: 6px 8px; font-size: 13px; } }
</style>
</head>
<body>
<h1>PR Board</h1>
<p class="subtitle">Jesse Fowler - All-Time Personal Records</p>
<div id="content">Loading...</div>
<div class="updated" id="updated"></div>
<script>
fetch('DASHBOARD.json')
  .then(r => r.json())
  .then(data => {
    let html = '';
    for (const [section, lifts] of Object.entries(data.sections)) {
      html += '<h2>' + section + '</h2><table><tr><th>Exercise</th><th>PR</th><th>Date</th><th>Notes</th></tr>';
      for (const lift of lifts) {
        html += '<tr><td>' + lift.exercise + '</td><td class="load">' + lift.pr + '</td><td class="date">' + lift.date + '</td><td class="note">' + (lift.note || '') + '</td></tr>';
      }
      html += '</table>';
    }
    document.getElementById('content').innerHTML = html;
    document.getElementById('updated').textContent = 'Last updated: ' + data.updated;
  })
  .catch(e => document.getElementById('content').textContent = 'Error loading data');
</script>
</body>
</html>
